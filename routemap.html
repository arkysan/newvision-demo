<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>New Vision — Global Shipping Routes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a1510;font-family:'Segoe UI',system-ui,sans-serif;color:#e8f5e9;overflow:hidden}

/* ── MAP ── */
#map{position:absolute;inset:0;bottom:64px}
.leaflet-container{background:#091410}
.leaflet-tile-pane{opacity:.88}
.leaflet-control-zoom{display:none}
.leaflet-attribution-flag{display:none!important}
.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#3a5a3a!important;font-size:9px;max-width:200px}
.leaflet-control-attribution a{color:#3a5a3a!important}
.leaflet-popup-content-wrapper{
  background:#0f1e14!important;border:1px solid #1e3326!important;color:#e8f5e9!important;
  border-radius:12px!important;padding:0!important;box-shadow:0 4px 24px rgba(0,0,0,.6)!important;
  min-width:160px
}
.leaflet-popup-content{margin:12px 14px!important;font-size:12px}
.leaflet-popup-tip{background:#0f1e14!important}
.popup-title{font-size:13px;font-weight:800;color:#81C784;margin-bottom:5px}
.popup-sub{color:#7a9e7e;font-size:11px;line-height:1.4}
.popup-days{display:inline-block;background:rgba(46,125,50,.2);border:1px solid rgba(46,125,50,.3);
  color:#81C784;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800;margin-top:5px}

/* ── BOTTOM BAR ── */
#bar{
  position:absolute;bottom:0;left:0;right:0;height:64px;
  background:linear-gradient(135deg,#0a1c10,#0f2018);
  border-top:2px solid #1e3a26;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
#bar::-webkit-scrollbar{display:none}
.rt-btn{
  flex-shrink:0;border:1px solid #1e3a26;background:rgba(0,0,0,.35);color:#81C784;
  border-radius:8px;padding:7px 12px;font:700 12px inherit;cursor:pointer;white-space:nowrap;
  transition:all .2s;
}
.rt-btn:hover,.rt-btn.active{border-color:#43A047;background:rgba(46,125,50,.25);color:#fff}
.bar-divider{width:1px;height:32px;background:#1e3a26;flex-shrink:0;margin:0 4px}
.bar-cta{
  flex-shrink:0;background:#1B5E20;color:#fff;border:1px solid #2e5e35;
  border-radius:8px;padding:7px 14px;font:700 12px inherit;cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
  transition:background .2s;
}
.bar-cta:hover{background:#2E7D32}
.bar-cta.green{background:#2E7D32}

/* ── ROUTE STATUS OVERLAY (top-right) ── */
#routeInfo{
  position:absolute;top:14px;right:14px;z-index:500;
  background:rgba(9,20,16,.9);border:1px solid #1e3a26;
  border-radius:12px;padding:12px 14px;min-width:220px;
  backdrop-filter:blur(8px);
  transition:opacity .3s;
}
#routeInfo h4{font-size:11px;font-weight:900;color:#4a7a4a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
#routeInfo h4 span{width:8px;height:8px;border-radius:50%;background:#43A047;display:inline-block}
#routeName{font-size:14px;font-weight:800;color:#81C784;margin-bottom:4px}
#routeMeta{font-size:11px;color:#7a9e7e;line-height:1.5}
.rm-pill{display:inline-block;background:rgba(46,125,50,.18);border:1px solid rgba(46,125,50,.25);
  color:#81C784;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800;margin:4px 2px 0 0}

/* ── LIVE DOT ── */
.live-dot{
  position:absolute;top:14px;left:14px;z-index:500;
  background:rgba(9,20,16,.85);border:1px solid #1e3a26;border-radius:20px;
  padding:5px 10px;font-size:11px;font-weight:700;color:#43A047;
  display:flex;align-items:center;gap:6px;backdrop-filter:blur(6px);
}
.live-dot span{width:7px;height:7px;border-radius:50%;background:#43A047;box-shadow:0 0 8px #43A047;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── ANIMATED SHIP MARKERS ── */
.ship-marker{
  width:12px;height:12px;border-radius:50%;
  background:#81C784;border:2px solid #fff;
  box-shadow:0 0 10px rgba(129,199,132,.7);
}
.ship-origin{
  width:14px;height:14px;border-radius:50%;
  background:#C9A24B;border:2px solid #fff;
  box-shadow:0 0 12px rgba(201,162,75,.7);
}

/* mobile */
@media(max-width:600px){
  #routeInfo{display:none}
}
</style>
</head>
<body>

<div id="map"></div>

<div class="live-dot"><span></span> New Vision — Active Routes</div>

<div id="routeInfo">
  <h4><span></span> Active Route</h4>
  <div id="routeName">All Routes</div>
  <div id="routeMeta">
    <span class="rm-pill">6 ports</span>
    <span class="rm-pill">16–48 days</span>
    <span class="rm-pill">FOB → CIF</span>
  </div>
</div>

<div id="bar">
  <button class="rt-btn active" data-route="all" onclick="selectRoute('all',this)">All Routes</button>
  <button class="rt-btn" data-route="gulf" onclick="selectRoute('gulf',this)">Gulf (Jebel Ali)</button>
  <button class="rt-btn" data-route="eastAfrica" onclick="selectRoute('eastAfrica',this)">East Africa</button>
  <button class="rt-btn" data-route="westAfrica" onclick="selectRoute('westAfrica',this)">West Africa</button>
  <button class="rt-btn" data-route="europe" onclick="selectRoute('europe',this)">Europe</button>
  <button class="rt-btn" data-route="latinAmerica" onclick="selectRoute('latinAmerica',this)">Latin America</button>
  <button class="rt-btn" data-route="caribbean" onclick="selectRoute('caribbean',this)">Caribbean</button>
  <div class="bar-divider"></div>
  <a class="bar-cta" href="./track.html" target="_blank">🚢 Track Shipment</a>
  <a class="bar-cta green" href="./#quote">📋 Get CIF Quote →</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── REAL MARITIME ROUTES ──────────────────────────────────────
   All waypoints are lat/lon arrays following actual sea lanes.
   Routes avoid land crossings by following recognised shipping channels.
───────────────────────────────────────────────────────────────*/
const ROUTES = {
  gulf: {
    name:'Gulf Lane — Shanghai to Jebel Ali', color:'#C9A24B',
    days:'18–26', port:'Jebel Ali (UAE)', dest:[25.01,55.09],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],   // East China Sea
      [22.0, 120.5],   // Taiwan Strait
      [18.5, 115.5],   // South China Sea
      [10.5, 109.5],   // South China Sea south
      [3.0,  104.5],   // Singapore approach
      [1.30, 103.82],  // Singapore Strait
      [-1.0, 100.5],   // Malacca south
      [4.5,  94.0],    // Andaman Sea
      [8.0,  78.0],    // Indian Ocean
      [11.0, 65.0],    // Arabian Sea
      [14.0, 58.5],    // Gulf of Oman approach
      [22.0, 57.5],    // Oman coast
      [23.5, 57.0],    // Gulf entry
      [25.01,55.09],   // Jebel Ali
    ]
  },
  eastAfrica: {
    name:'East Africa Lane — Shanghai to Mombasa', color:'#43A047',
    days:'22–30', port:'Mombasa (Kenya)', dest:[-4.05,39.67],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],
      [22.0, 120.5],
      [18.5, 115.5],
      [10.5, 109.5],
      [3.0,  104.5],
      [1.30, 103.82],  // Singapore
      [-1.0, 100.5],   // Malacca south
      [4.5,  94.0],    // Andaman Sea
      [0.0,  80.0],    // Central Indian Ocean
      [-5.0, 68.0],    // Chagos area
      [-8.0, 55.0],    // SW Indian Ocean
      [-8.0, 45.0],    // Mozambique approach
      [-6.0, 40.5],    // East African coast
      [-4.05,39.67],   // Mombasa
    ]
  },
  westAfrica: {
    name:'West Africa Lane — Shanghai to Lagos', color:'#EF6C00',
    days:'28–38', port:'Lagos (Nigeria)', dest:[6.45,3.40],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],
      [22.0, 120.5],
      [18.5, 115.5],
      [10.5, 109.5],
      [3.0,  104.5],
      [1.30, 103.82],  // Singapore
      [-1.0, 100.5],
      [4.5,  94.0],
      [0.0,  80.0],
      [-8.0, 68.0],
      [-18.0,55.0],    // SW Indian Ocean
      [-30.0,38.0],    // Approaching Cape
      [-34.36,18.48],  // Cape of Good Hope
      [-33.0, 8.0],    // South Atlantic
      [-25.0, 3.0],    // Atlantic north
      [-15.0, 1.0],
      [-5.0,  1.5],    // Gulf of Guinea approach
      [0.0,   2.5],
      [6.45,  3.40],   // Lagos
    ]
  },
  europe: {
    name:'Europe Lane — Shanghai to Antwerp', color:'#1E88E5',
    days:'30–40', port:'Antwerp (Belgium)', dest:[51.23,4.40],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],
      [22.0, 120.5],
      [18.5, 115.5],
      [10.5, 109.5],
      [3.0,  104.5],
      [1.30, 103.82],  // Singapore
      [-1.0, 100.5],
      [4.5,  94.0],
      [8.0,  78.0],
      [11.0, 65.0],
      [12.5, 48.5],    // Gulf of Aden
      [12.5, 44.0],    // Bab-el-Mandeb
      [15.0, 42.0],    // Red Sea
      [20.0, 38.0],
      [24.0, 36.0],
      [27.0, 34.5],
      [30.0, 32.5],    // Suez Canal
      [31.0, 32.5],    // Suez north
      [31.5, 31.5],    // Port Said
      [32.5, 28.0],    // E Mediterranean
      [35.0, 25.0],    // Crete south
      [37.0, 22.0],    // Ionian Sea
      [38.5, 16.5],    // Strait of Messina area
      [38.0, 12.5],    // Tyrrhenian Sea
      [40.0,  6.0],    // W Mediterranean
      [42.0,  4.0],
      [43.5,  3.0],    // S France coast
      [44.0, -1.0],    // Bay of Biscay entry
      [46.0, -3.5],    // Bay of Biscay
      [48.5, -5.0],    // Brittany
      [50.0,  0.5],    // English Channel
      [51.23, 4.40],   // Antwerp
    ]
  },
  latinAmerica: {
    name:'Latin America Lane — Shanghai to Santos', color:'#8E24AA',
    days:'32–48', port:'Santos (Brazil)', dest:[-23.94,-46.31],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],
      [22.0, 120.5],
      [18.5, 115.5],
      [10.5, 109.5],
      [3.0,  104.5],
      [1.30, 103.82],  // Singapore
      [-1.0, 100.5],
      [4.5,  94.0],
      [-5.0, 78.0],
      [-15.0,65.0],
      [-25.0,52.0],
      [-34.36,18.48],  // Cape of Good Hope
      [-35.0, 6.0],    // South Atlantic
      [-33.0,-8.0],
      [-30.0,-22.0],
      [-27.0,-35.0],
      [-25.0,-42.0],
      [-23.94,-46.31], // Santos
    ]
  },
  caribbean: {
    name:'Caribbean Lane — Shanghai to Kingston', color:'#00ACC1',
    days:'30–45', port:'Kingston (Jamaica)', dest:[17.98,-76.79],
    pts:[
      [31.23,121.47],  // Shanghai
      [25.0, 123.0],
      [22.0, 120.5],
      [18.5, 115.5],
      [10.5, 109.5],
      [3.0,  104.5],
      [1.30, 103.82],  // Singapore
      [-1.0, 100.5],
      [4.5,  94.0],
      [8.0,  78.0],
      [11.0, 65.0],
      [12.5, 48.5],    // Gulf of Aden
      [12.5, 44.0],    // Bab-el-Mandeb
      [15.0, 42.0],    // Red Sea
      [20.0, 38.0],
      [27.0, 34.5],
      [30.0, 32.5],    // Suez
      [31.5, 31.5],    // Port Said
      [35.0, 25.0],    // E Mediterranean
      [38.0, 16.5],
      [38.0, 12.5],
      [40.0,  6.0],    // W Mediterranean
      [36.5, -5.4],    // Strait of Gibraltar
      [36.0,-10.0],    // Atlantic
      [32.0,-20.0],
      [25.0,-35.0],    // Mid Atlantic
      [18.0,-55.0],
      [17.98,-76.79],  // Kingston
    ]
  }
};

/* Port labels */
const PORTS = {
  'Shanghai':     { pos:[31.23,121.47], origin:true,  label:'China Origin' },
  'Singapore':    { pos:[1.30,103.82],  origin:false, label:'Transit hub'  },
  'Jebel Ali':    { pos:[25.01,55.09],  origin:false, label:'18–26 days'   },
  'Mombasa':      { pos:[-4.05,39.67],  origin:false, label:'22–30 days'   },
  'Lagos':        { pos:[6.45,3.40],    origin:false, label:'28–38 days'   },
  'Antwerp':      { pos:[51.23,4.40],   origin:false, label:'30–40 days'   },
  'Santos':       { pos:[-23.94,-46.31],origin:false, label:'32–48 days'   },
  'Kingston':     { pos:[17.98,-76.79], origin:false, label:'30–45 days'   },
  'Cape of Good Hope':{ pos:[-34.36,18.48],origin:false,label:'Transit point'},
  'Suez Canal':   { pos:[30.0,32.5],    origin:false, label:'Transit point' },
};

/* ── MAP INIT ── */
window.leafletMap = L.map('map',{
  center:[15,60], zoom:3, zoomControl:false,
  attributionControl:true, worldCopyJump:false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  subdomains:'abcd', maxZoom:19,
}).addTo(window.leafletMap);

/* ── DRAW ROUTES ── */
const routeLayers={};
Object.entries(ROUTES).forEach(([key,r])=>{
  const line = L.polyline(r.pts,{
    color:r.color, weight:2.5, opacity:0.7,
    dashArray:'8 5', smoothFactor:1,
  }).addTo(window.leafletMap)
    .bindPopup(`<div class="popup-title">🚢 ${r.name}</div><div class="popup-sub">${r.port}</div><span class="popup-days">~${r.days} days</span>`);
  routeLayers[key]=line;
});

/* ── PORT MARKERS ── */
const originIcon = L.divIcon({className:'',html:`<div class="ship-origin"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
const portIcon   = L.divIcon({className:'',html:`<div class="ship-marker"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
const transitIcon= L.divIcon({className:'',html:`<div style="width:8px;height:8px;border-radius:50%;background:#4a7a4a;border:1px solid #7a9e7e"></div>`,iconSize:[8,8],iconAnchor:[4,4]});

Object.entries(PORTS).forEach(([name,p])=>{
  const isOrigin=p.origin, isTransit=(name==='Cape of Good Hope'||name==='Suez Canal'||name==='Singapore');
  const icon=isOrigin?originIcon:isTransit?transitIcon:portIcon;
  L.marker(p.pos,{icon}).addTo(window.leafletMap)
   .bindPopup(
     `<div class="popup-title">${isOrigin?'🏭':isTransit?'⚓':'🚢'} ${name}</div>`+
     `<div class="popup-sub">${isOrigin?'New Vision loading port':''}${p.label?`<br><span style="color:#81C784;font-weight:700">${p.label}</span>`:''}</div>`
   );
});

/* ── ANIMATED SHIP DOTS ── */
const shipMarkers={};
const SHIP_ICON = L.divIcon({
  className:'',
  html:`<div style="width:10px;height:10px;border-radius:50%;background:#81C784;border:2px solid #fff;box-shadow:0 0 10px #43A047;"></div>`,
  iconSize:[10,10], iconAnchor:[5,5]
});

function animateShips(){
  const now=Date.now()/1000;
  Object.entries(ROUTES).forEach(([key,r])=>{
    const pts=r.pts;
    // Calculate total route length
    let totalDist=0, segDists=[];
    for(let i=0;i<pts.length-1;i++){
      const d=Math.sqrt((pts[i+1][0]-pts[i][0])**2+(pts[i+1][1]-pts[i][1])**2);
      segDists.push(d);
      totalDist+=d;
    }
    // Animate at different speeds/offsets per route
    const speed=0.012; // degrees per second
    const offset={gulf:0,eastAfrica:0.3,westAfrica:0.6,europe:0.15,latinAmerica:0.45,caribbean:0.8}[key]||0;
    const progress=((now*speed+offset*totalDist)%totalDist+totalDist)%totalDist;
    // Find position along route
    let dist=0, pos=null;
    for(let i=0;i<pts.length-1;i++){
      if(dist+segDists[i]>=progress){
        const t=(progress-dist)/segDists[i];
        pos=[pts[i][0]+(pts[i+1][0]-pts[i][0])*t, pts[i][1]+(pts[i+1][1]-pts[i][1])*t];
        break;
      }
      dist+=segDists[i];
    }
    if(!pos) pos=pts[pts.length-1];
    if(!shipMarkers[key]){
      shipMarkers[key]=L.marker(pos,{icon:SHIP_ICON,zIndexOffset:100}).addTo(window.leafletMap)
        .bindTooltip(r.name,{permanent:false,direction:'top',offset:[0,-8],className:'leaflet-tooltip-dark'});
    } else {
      shipMarkers[key].setLatLng(pos);
    }
  });
  requestAnimationFrame(animateShips);
}
animateShips();

/* ── ROUTE SELECTOR ── */
const ROUTE_INFO={
  all:    {name:'All Routes — 6 Active Lanes',  meta:'6 ports · 16–48 days · FOB to CIF',    pills:['6 ports','16–48 days','FOB → CIF']},
  gulf:        {name:'Gulf Lane — Jebel Ali',   meta:'UAE + Gulf re-export hub',               pills:['Jebel Ali','18–26 days','SUV / EV']},
  eastAfrica:  {name:'East Africa — Mombasa',   meta:'Kenya · Tanzania · Uganda · region',     pills:['Mombasa','22–30 days','SUV / PHEV']},
  westAfrica:  {name:'West Africa — Lagos',     meta:'Nigeria · West Africa dealers',          pills:['Lagos','28–38 days','SUV / Value']},
  europe:      {name:'Europe — Antwerp',        meta:'Suez canal route · full docs required',  pills:['Antwerp','30–40 days','EV / Docs']},
  latinAmerica:{name:'Latin America — Santos',  meta:'Brazil · South America fleet buyers',    pills:['Santos','32–48 days','EV / Fleet']},
  caribbean:   {name:'Caribbean — Kingston',    meta:'Jamaica · island dealer lanes',          pills:['Kingston','30–45 days','Compact / Value']},
};

function selectRoute(key, btn){
  document.querySelectorAll('.rt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const info=ROUTE_INFO[key];
  document.getElementById('routeName').textContent=info.name;
  document.getElementById('routeMeta').innerHTML=info.pills.map(p=>`<span class="rm-pill">${p}</span>`).join('');
  // Show/hide route lines
  Object.entries(routeLayers).forEach(([k,layer])=>{
    if(key==='all'||key===k){ layer.setStyle({opacity:0.75,weight:2.5}); }
    else { layer.setStyle({opacity:0.12,weight:1.5}); }
  });
  // Fly to destination
  if(key!=='all'&&ROUTES[key]){
    const dest=ROUTES[key].dest;
    window.leafletMap.flyTo(dest,4,{duration:1.5});
  } else {
    window.leafletMap.flyTo([15,60],3,{duration:1.5});
  }
}

/* ── EMBED MODE ── */
(function(){
  if(new URLSearchParams(location.search).get('embed')==='1'){
    document.documentElement.style.overflow='hidden';
    document.body.style.overflow='hidden';
    setTimeout(()=>window.leafletMap.invalidateSize(),200);
  }
})();
</script>
</body>
</html>
