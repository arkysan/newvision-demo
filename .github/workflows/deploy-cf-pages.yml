name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Sync to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup wrangler auth
        run: |
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\n' "$CF_OAUTH_TOKEN" > ~/.wrangler/config/default.toml
        env:
          CF_OAUTH_TOKEN: ${{ secrets.CF_OAUTH_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4.95.0 pages deploy . --project-name=newvision --branch=main
